name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Chrome extension
        run: npm run build:ci

      - name: Build Firefox extension
        run: node scripts/build-firefox.mjs

      - name: Package Chrome ZIP
        run: cd dist && zip -r ../hikr-chrome-${{ github.ref_name }}.zip . && cd ..

      - name: Package Firefox ZIP
        run: cd dist-firefox && zip -r ../hikr-firefox-${{ github.ref_name }}.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: HikrPlus ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            hikr-chrome-${{ github.ref_name }}.zip
            hikr-firefox-${{ github.ref_name }}.zip
